random_seed: 42
dataset:
  name: ford
  accepted_dir: null
  rejected_dir: null
  accepted_file_pattern: "Sweep_trans_{index}_accept.csv"
  rejected_file_pattern: "Sweep_trans_{index}_reject.csv"
  feature_columns: {prefix: "feature_", start: 0, end: 47}
  label_column: "feature_55"
  normal_label: 0
  anomaly_label: 1
  train_indices: null
  test_indices: null
  validation_fraction: 0.2
  split_by_file: true
  random_seed: 42
  missing_values: {strategy: "median"}
  clipping: {enabled: true, lower_quantile: 0.001, upper_quantile: 0.999}
  scaling: {method: "standard"}
  windowing: {lookback: 10, stride: 1, representation: "full_window_flattened"}
  downsampling: {every_n_rows: 1}
model:
  name: isolation_forest
  parameters: {n_estimators: 100, contamination: auto, random_state: 42}
threshold:
  method: percentile
  percentile: 95.0
save_model: {enabled: false, dir: models}
